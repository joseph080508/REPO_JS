<!-- MODAL CREAR TICKET -->
<dialog class="modal-overlay" id="modal-ticket">
  <article class="modal">

    <header class="modal-header">
      <h2 class="modal-title" id="ticket-modal-title">New Ticket</h2>
      <button class="modal-close" id="modal-close" aria-label="Cerrar">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </header>

    <form class="modal-form" id="form-ticket">

      <fieldset class="form-group">
        <label for="ticket-title">Title</label>
        <input type="text" id="ticket-title" placeholder="Enter the ticket title" required>
      </fieldset>

      <fieldset class="form-group">
        <label for="ticket-desc">Description</label>
        <textarea id="ticket-desc" rows="4" placeholder="Describe the problem or request" required></textarea>
      </fieldset>

      <div class="form-row">

        <fieldset class="form-group">
          <label for="ticket-prioridad">Priority</label>
          <select id="ticket-prioridad" value="">
            <option value="">Select...</option>
            <option value="Imperative">Imperative</option>
            <option value="high">high</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
          </select>
        </fieldset>

        <fieldset class="form-group">
          <label for="ticket-categoria">Case Type</label>
           <input type="text" id="ticket-type" placeholder="e.g: incident, request, support" required>
        </fieldset>

      </div>

      <fieldset class="form-group" id="ticket-status-group">
        <label for="ticket-status">Status</label>
        <select id="ticket-status">
          <option value="In Progress">En proceso</option>
          <option value="Assigned">Asignado</option>
          <option value="Solved">Solucionado</option>
        </select>
      </fieldset>

      <footer class="modal-footer">
        <button type="button" class="btn-cancel" id="btn-cancel">Cancel</button>
        <button type="submit" class="btn-submit" id="ticket-submit">Create a Ticket</button>
      </footer>

    </form>

  </article>
</dialog>
