<!-- MODAL CREAR TICKET -->
<dialog class="modal-overlay" id="modal-ticket">
  <article class="modal">

    <header class="modal-header">
      <h2 class="modal-title">New Ticket</h2>
      <button class="modal-close" id="modal-close" aria-label="Cerrar">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </header>

    <form class="modal-form" id="form-ticket">

      <fieldset class="form-group">
        <label for="ticket-titulo">Title</label>
        <input type="text" id="ticket-titulo" placeholder="Enter the ticket title" required>
      </fieldset>

      <fieldset class="form-group">
        <label for="ticket-desc">Description</label>
        <textarea id="ticket-desc" rows="4" placeholder="Describe the problem or request"></textarea>
      </fieldset>

      <div class="form-row">

        <fieldset class="form-group">
          <label for="ticket-prioridad">Priority</label>
          <select id="ticket-prioridad">
            <option value="">Select...</option>
            <option value="urgente">Imperative</option>
            <option value="alta">high</option>
            <option value="media">Medium</option>
            <option value="baja">Low</option>
          </select>
        </fieldset>

        <fieldset class="form-group">
          <label for="ticket-categoria">Case Type</label>
           <input type="text" id="ticket-type" placeholder="e.g: incident, request, support" required>
        </fieldset>

      </div>

      <footer class="modal-footer">
        <button type="button" class="btn-cancel" id="btn-cancel">Cancel</button>
        <button type="submit" class="btn-submit">Create a Ticket</button>
      </footer>

    </form>

  </article>
</dialog>
